<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京 5 天 4 夜深度遊 - 2026 行程指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        
        :root {
            --tokyo-red: #E60012;
            --tokyo-blue: #005596;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
            background: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .day-btn.active {
            background-color: var(--tokyo-red);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(230, 0, 18, 0.3);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 0;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--tokyo-red);
            border: 4px solid white;
            box-shadow: 0 0 0 2px var(--tokyo-red);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .day-content { display: none; }
        .day-content.active { display: block; }

        /* 語言切換選單樣式 */
        .lang-dropdown:hover .lang-menu {
            display: block;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- 語言切換 (右上角) -->
    <div class="fixed top-4 right-4 z-[100] lang-dropdown">
        <button class="glass-card px-4 py-2 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-white transition-colors">

        </button>
        <div class="lang-menu hidden absolute right-0 mt-2 w-32 bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden">

            <button onclick="changeLang('en')" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-50 transition-colors">English</button>
            <button onclick="changeLang('ja')" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-50 transition-colors">日本語</button>
        </div>
    </div>

    <!-- 頂部導航 -->

        <div class="relative z-10">

            </div>
        </div>
        <div id="t-hero-bg-text" class="absolute top-0 right-0 text-white/5 text-9xl transform translate-x-1/4 -translate-y-1/4 select-none">TOKYO</div>
    </header>

    <main class="max-w-5xl mx-auto px-4 -mt-8 pb-20">
        
        <!-- 天數切換按鈕 -->
        <nav class="flex justify-between md:justify-center gap-2 mb-8 overflow-x-auto pb-2 px-1">
            <button onclick="showDay(1)" id="btn-1" class="day-btn active glass-card min-w-[80px] py-3 rounded-2xl font-bold transition-all">DAY 1</button>
            <button onclick="showDay(2)" id="btn-2" class="day-btn glass-card min-w-[80px] py-3 rounded-2xl font-bold transition-all">DAY 2</button>

            <button onclick="showDay(4)" id="btn-4" class="day-btn glass-card min-w-[80px] py-3 rounded-2xl font-bold transition-all">DAY 4</button>
            <button onclick="showDay(5)" id="btn-5" class="day-btn glass-card min-w-[80px] py-3 rounded-2xl font-bold transition-all">DAY 5</button>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- 左側主要行程內容 (動態替換) -->
            <div id="itinerary-container" class="lg:col-span-2">
                <!-- 由 JavaScript 動態生成渲染內容 -->
            </div>

            <!-- 右側側邊欄 -->
            <div class="space-y-6">
                <!-- 匯率轉換 -->
                <div class="glass-card p-6 rounded-3xl">
                    <h3 id="t-tools-currency" class="font-bold text-lg mb-4 flex items-center gap-2">
                        <i class="fas fa-coins text-yellow-500"></i> 即時匯率參考
                    </h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center bg-white/50 p-3 rounded-xl border">
                            <span class="text-sm">1 TWD</span>
                            <span class="font-bold text-blue-600">≈ 4.68 JPY</span>
                        </div>
                        <input type="number" id="twd-input" placeholder="輸入台幣金額" class="w-full p-3 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-blue-400" oninput="convertCurrency()">
                        <div id="jpy-result" class="text-center font-bold text-2xl text-slate-700 mt-2">0 JPY</div>
                    </div>
                </div>

                <!-- 交通票券 -->
                <div class="glass-card p-6 rounded-3xl border-l-4 border-blue-500">
                    <h3 id="t-tools-transport" class="font-bold text-lg mb-4">🚇 必備交通卡</h3>
                    <ul class="space-y-3 text-sm" id="t-transport-list">
                        <!-- 動態填充 -->
                    </ul>
                </div>

                <!-- 準備清單 -->
                <div class="glass-card p-6 rounded-3xl">
                    <h3 id="t-tools-prep" class="font-bold text-lg mb-4">🎒 出發前必做</h3>
                    <div class="space-y-2" id="t-prep-list">
                        <!-- 動態填充 -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full glass-card border-t py-4 px-8 flex justify-around md:hidden z-50">

        let currentLang = 'zh';
        let currentDay = 1;

        function renderStaticText() {
            const t = translations[currentLang];
            document.getElementById('current-lang-label').innerText = t.label;
            document.getElementById('t-hero-title').innerText = t.hero.title;
            document.getElementById('t-hero-subtitle').innerText = t.hero.subtitle;
            document.getElementById('t-hero-date').innerText = t.hero.date;
            document.getElementById('t-hero-stay').innerText = t.hero.stay;
            document.getElementById('t-hero-bg-text').innerText = t.hero.bg;
            document.getElementById('t-tools-currency').innerHTML = `<i class="fas fa-coins text-yellow-500"></i> ${t.tools.currency}`;
            document.getElementById('twd-input').placeholder = t.tools.currencyInput;
            document.getElementById('t-tools-transport').innerText = t.tools.transport;
            document.getElementById('t-tools-prep').innerText = t.tools.prep;

            // Transport List
            const transportUl = document.getElementById('t-transport-list');
            transportUl.innerHTML = t.transport.map(item => `
                <li class="flex items-start gap-2">
                    <i class="fas fa-check-circle text-green-500 mt-1"></i>
                    <span>${item}</span>
                </li>
            `).join('');

            // Prep List
            const prepUl = document.getElementById('t-prep-list');
            prepUl.innerHTML = t.prep.map(item => `
                <label class="flex items-center gap-3 p-2 hover:bg-white/50 rounded-lg cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded">
                    <span class="text-sm">${item}</span>
                </label>
            `).join('');
        }

        function renderDayContent() {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = ''; // Clear

            const t = translations[currentLang];
            
            t.days.forEach((day, index) => {
                const dayNum = index + 1;
                const section = document.createElement('section');
                section.id = `day-${dayNum}`;
                section.className = `day-content ${dayNum === currentDay ? 'active' : ''} fade-in`;

                let html = `
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-red-100 text-red-600 w-10 h-10 flex items-center justify-center rounded-lg font-bold text-xl">${dayNum}</span>
                        <h2 class="text-2xl font-bold">${day.title}</h2>
                    </div>
                `;

                if (day.isSpecial) {
                    html += `
                        <div class="bg-purple-50 border border-purple-100 p-6 rounded-2xl mb-6">
                            <h3 class="font-bold text-purple-800 mb-4"><i class="fas fa-star mr-2"></i>${day.specialContent.head}</h3>
                            <div class="grid md:grid-cols-2 gap-4">
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-purple-200">
                                    <p class="text-sm text-slate-600">${day.specialContent.a}</p>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-purple-200">
                                    <p class="text-sm text-slate-600">${day.specialContent.b}</p>
                                </div>
                            </div>
                            <p class="mt-4 text-sm text-purple-600 font-medium">${day.specialContent.note}</p>
                        </div>
                    `;
                } else {
                    html += `<div class="ml-4 border-l-2 border-slate-200 pl-8 space-y-10">`;
                    day.items.forEach(item => {
                        html += `
                            <div class="relative timeline-item">
                                <span class="text-sm font-medium text-slate-400">${item.time}</span>
                                <h3 class="text-lg font-bold">${item.head}</h3>
                                <p class="text-slate-600 mt-1">${item.desc}</p>
                                ${item.tags ? `
                                    <div class="mt-3 flex gap-2">
                                        ${item.tags.map(tag => `<span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded">${tag}</span>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                section.innerHTML = html;
                container.appendChild(section);
            });
        }

        function showDay(dayNumber) {
            currentDay = dayNumber;
            document.querySelectorAll('.day-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`day-${dayNumber}`).classList.add('active');
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${dayNumber}`).classList.add('active');
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        function changeLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'ja' ? 'ja' : (lang === 'zh' ? 'zh-Hant' : 'en');
            renderStaticText();
            renderDayContent();
        }

        function convertCurrency() {
            const twd = document.getElementById('twd-input').value;
            const rate = 4.68;
            const result = document.getElementById('jpy-result');
            if(twd > 0) {
                const jpy = Math.round(twd * rate).toLocaleString();
                result.innerText = jpy + " JPY";
            } else {
                result.innerText = "0 JPY";
            }
        }

        // Initialize
        window.onload = () => {
            renderStaticText();
            renderDayContent();
        };
    </script>
</body>
</html>
